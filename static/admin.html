<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWatch — Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<header class="header">
    <div class="brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        CyberWatch &nbsp;<span style="color:var(--text-muted);font-weight:400">/</span>&nbsp; Admin
    </div>
    <a href="/" class="nav-link">← Monitor</a>
</header>

<div class="admin-layout">

    <!-- Stats row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" id="stat-total" style="color:var(--text)">0</div>
            <div class="stat-label">Total Flagged</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-critical" style="color:var(--critical)">0</div>
            <div class="stat-label">Critical</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-high" style="color:var(--high)">0</div>
            <div class="stat-label">High</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-medium" style="color:var(--medium)">0</div>
            <div class="stat-label">Medium</div>
        </div>
    </div>

    <!-- Section header -->
    <div class="section-header">
        <span class="section-title">Flagged Messages</span>
        <div class="conn-indicator">
            <div class="conn-dot" id="conn-dot"></div>
            <span id="conn-label">Connecting…</span>
        </div>
    </div>

    <!-- Alert list -->
    <div class="alert-list" id="alert-list">
        <div class="empty-admin">
            <span>🛡</span>
            No flagged messages yet.<br>
            Alerts will appear here in real time.
        </div>
    </div>

</div>

<script src="/static/admin.js"></script>
</body>
</html>
